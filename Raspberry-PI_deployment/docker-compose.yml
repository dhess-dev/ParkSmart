services:
  postgres:
    image: postgres:16
    container_name: groupone_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: groupone_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/fes-wiesbaden/backend:latest
    container_name: groupone_backend
    platform: linux/arm64
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: groupone_db
      DB_USER: postgres
      DB_PASSWORD: password
      KEYSTORE_PASSWORD: gruppe1
      SERVER_SSL_KEY_STORE: file:/app/keystore.p12
      MQTT_BROKER_URL: "tcp://host.docker.internal:1883"
      MQTT_USERNAME: "gruppe1"
      MQTT_PASSWORD: "gruppe1"
      CORS_Origin: "https://gruppe1iot-dev.local:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8443:8443"
    volumes:
      - ./keystore.p12:/app/keystore.p12
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/fes-wiesbaden/frontend:latest
    container_name: groupone_frontend
    platform: linux/arm64
    ports:
      - "5173:443"
    depends_on:
      - backend
    environment:
      VITE_API_URL: "https://gruppe1iot-dev.local:8443"

volumes:
  postgres_data:
