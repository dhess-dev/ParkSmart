events {}

http {
  server {
    listen 443 ssl;
    server_name gruppe1iot-dev.local;

    ssl_certificate     /etc/ssl/certs/cert.pem;
    ssl_certificate_key /etc/ssl/private/key.pem;

    root /usr/share/nginx/html;
    index index.html;
    location / {
      try_files $uri /index.html;
    }
  }
}
