name: Build, Test, and Push to GitHub Container Registry

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: groupone_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..10}; do
            if pg_isready -h localhost -p 5432; then
              echo "PostgreSQL is ready";
              break;
            fi;
            echo "Waiting for PostgreSQL...";
            sleep 5;
          done

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test

      - name: Decode and save keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > backend/src/main/resources/keystore.p12

      - name: Start backend server
        working-directory: backend
        run: ./gradlew bootRun &

      - name: Wait for backend to be ready
        run: |
          for i in {1..10}; do
            if curl -s https://localhost:8443/api/hello | grep '"message":"Hello from Spring!"'; then
              echo "Backend is ready";
              break;
            fi;
            echo "Waiting for backend...";
            sleep 5;
          done

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8443
        run: npm test

      - name: Stop backend server
        run: pkill -f 'java.*bootRun'

      - name: Build backend JAR
        working-directory: backend
        run: ./gradlew clean bootJar

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        working-directory: backend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/${{ github.repository_owner }}/backend:latest \
            --push \
            .

      - name: Build and push frontend Docker image
        working-directory: frontend
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VITE_API_URL=https://gruppe1iot.local:8443 \
            -t ghcr.io/${{ github.repository_owner }}/frontend:latest \
            --push \
            .
